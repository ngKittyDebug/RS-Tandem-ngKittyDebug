    <div class="cities__cat-timer">00:00</div>
    <button class="cities__restart-btn" (click)="restart()" tuiButton appearance="gradient" type="button" size="s"
      iconEnd="@tui.rotate-ccw">
      {{ t('citiesGame.restart') }}
    </button>
  </div>
  <div class="cities__chat">
    <div class="cities__chat-area">
      @for (message of visibleMessages; track $index) {
      <span class="cities__chat-container" [ngClass]="{
            'cities__chat-incoming': message.type === 'incoming',
            'cities__chat-outgoing': message.type === 'outgoing',
          }">
        @if (message.type === 'incomingSad') {
        <span tuiMessage>
          <span class="multiline">
            {{ t(message.text) }}
          </span>
        </span>
        } @else if ((message.type === 'incoming')) {
        <span tuiMessage>
          <tui-icon tuiHintDirection="right" [tuiTooltip]="getTooltip(message)"/>
          <span class="multiline">
            {{ message.text }}
          </span>
        </span>
        } @else {
        <span appearance="custom" tuiMessage>
            <tui-icon tuiHintDirection="left" [tuiTooltip]="getTooltip(message)"/>
          <span class="multiline">
            {{ message.text }}
          </span>
        </span>
        }
      </span>
      }
    </div>
    <form class="cities__chat-form" [formGroup]="messageForm">
      <tui-textfield class="cities__chat-input" tuiTextfieldSize="m">
        <label tuiLabel for="chatInput">{{ t('citiesGame.input') }}</label>
        <textarea tuiTextarea placeholder="{{ t('citiesGame.plaseholder') }}" id="chatInput"
          formControlName="message"></textarea>
      </tui-textfield>

      <button class="cities__chat-btn" tuiButton appearance="gradient" type="button" size="m" (click)="sendMessege()"
        [disabled]="isRunning">
        send
      </button>
    </form>
  </div>
  <div class="cities__user">
    <div class="cities__user-img-box">
      <img class="cities__user-img" src="./assets/images/andrey.jpg" alt="user_photo" />
    </div>
    <h3 class="cities__user-name">User Name</h3>
  </div>
</div>
