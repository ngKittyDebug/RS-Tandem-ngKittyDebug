<div class="hangman-container">
  @if (currentScreen === 'menu') {
    <app-menu (playGame)="startGame()" (main)="goToMain()" (results)="goToResults()" />
  }

  @if (currentScreen === 'game') {
    <app-game (back)="goToMenu()" (results)="goToResults()" />
  }

  @if (currentScreen === 'results') {
    <app-results (menu)="goToMenu()" />
  }
</div>
