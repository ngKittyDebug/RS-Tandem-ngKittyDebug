<div class="profile-stats" *transloco="let t">
  <div tuiCardLarge tuiAppearance="floating" tuiHeader class="profile-stats__card">
    <tui-icon
      class="profile-stats__icon profile-stats__icon_accent-1"
      icon="@tui.trophy"
      size="xl"
      tuiBadge
    />
    <p class="profile-stats__count profile-stats__count_accent-1">127</p>
    <p class="profile-stats__description">
      {{ t('userProfile.statistic.gamesPlayed') }}
    </p>
  </div>

  <div tuiCardLarge tuiAppearance="floating" tuiHeader class="profile-stats__card">
    <tui-icon
      class="profile-stats__icon profile-stats__icon_accent-2"
      icon="@tui.star"
      size="xl"
      tuiBadge
    />
    <p class="profile-stats__count profile-stats__count_accent-2">45,820</p>
    <p class="profile-stats__description">
      {{ t('userProfile.statistic.score') }}
    </p>
  </div>

  <div tuiCardLarge tuiAppearance="floating" tuiHeader class="profile-stats__card">
    <tui-icon
      class="profile-stats__icon profile-stats__icon_accent-3"
      icon="@tui.award"
      size="xl"
      tuiBadge
    />
    <p class="profile-stats__count profile-stats__count_accent-3">32</p>
    <p class="profile-stats__description">
      {{ t('userProfile.statistic.achievements') }}
    </p>
  </div>
</div>
