<div class="page page_user-profile" *transloco="let t">
  <header tuiHeader class="page-header">
    <h1 tuiTitle class="page-title">{{ t('userProfile.title') }}</h1>
    <p tuiSubtitle class="page-subtitle">{{ t('userProfile.subtitle') }}</p>
  </header>

  <div class="user-profile-layout">
    <app-profile-sidebar></app-profile-sidebar>

    <section class="user-settings">
      <app-profile-stats></app-profile-stats>
      <app-profile-settings></app-profile-settings>
      <app-recent-activity></app-recent-activity>
    </section>
  </div>
</div>
