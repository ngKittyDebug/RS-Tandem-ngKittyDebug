<div class="main-container" *transloco="let t">
  <header tuiHeader="h1">
    <hgroup tuiTitle>
      <h1>{{ t('main.title') }}</h1>
      <p tuiSubtitle>{{ t('main.subtitle') }}</p>
    </hgroup>
  </header>
  <div class="description">
    <p tuiSubtitle>{{ t('main.description.first') }}</p>
    <p tuiSubtitle>{{ t('main.description.second') }}</p>
    <p tuiSubtitle>{{ t('main.description.third') }}</p>
  </div>
  @if (size$ | async; as size) {
    <div class="container">
      <tui-block-status class="card" [card]="true">
        <img alt="cat inbox" src="assets/images/cat2.svg" tuiSlot="top" class="image" />

        {{ t('main.register') }}
        <button appearance="secondary" tuiButton type="button" [size]="size">
          {{ t('main.button.start') }}
        </button>
      </tui-block-status>
    </div>
  }
</div>
